<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open & Close Window</title>
</head>
<body>
  <button onclick="openAndClose()">Open Window</button>

  <script>
    function openAndClose() {
      var x = window.open('https://digital-credentials.dev/');
      setTimeout(function() {
        x.close();
      }, 5000);
    }
  </script>
</body>
</html>
